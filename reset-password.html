<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Whelle · Reset Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#f0f6fc;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Inter',sans-serif;padding:20px}
    .logo{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:#2a7ab5;margin-bottom:32px;text-align:center}
    .logo span{color:#f07d3a}
    .card{background:#fff;border-radius:16px;box-shadow:0 4px 24px rgba(42,122,181,.1);padding:40px;width:100%;max-width:420px}
    h2{font-family:'Syne',sans-serif;font-size:22px;font-weight:700;color:#1a202c;margin-bottom:6px}
    .sub{font-size:14px;color:#6b7280;margin-bottom:24px}
    .field{margin-bottom:16px}
    label{display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em}
    input{width:100%;background:#f9fafb;border:1.5px solid #e5e7eb;color:#1a202c;font-family:'Inter',sans-serif;font-size:14px;padding:11px 14px;border-radius:9px;outline:none;transition:border-color .15s}
    input:focus{border-color:#2a7ab5;background:#fff}
    .hint{font-size:11px;color:#9ca3af;margin-top:4px}
    .btn{width:100%;background:#2a7ab5;color:#fff;border:none;padding:13px;border-radius:9px;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;margin-top:8px}
    .btn:hover{background:#1e6091}
    .btn:disabled{opacity:.6;cursor:not-allowed}
    .btn.orange{background:#f07d3a}
    .btn.orange:hover{background:#d96a2a}
    .alert{padding:11px 14px;border-radius:9px;font-size:13px;margin-bottom:16px;display:none}
    .alert.show{display:block}
    .alert-error{background:#fff0f0;border:1px solid #fecaca;color:#dc2626}
    .alert-success{background:#f0fdf4;border:1px solid #bbf7d0;color:#15803d}
    .invalid{text-align:center;padding:12px 0}
    .invalid p{color:#dc2626;margin-bottom:16px;font-size:14px}
    .back{text-align:center;margin-top:20px;font-size:13px;color:#6b7280}
    .back a{color:#2a7ab5;text-decoration:none}
    .back a:hover{color:#1e6091}
  </style>
</head>
<body>
  <div class="logo">wh<span>elle</span></div>
  <div class="card" id="card">
    <h2>Choose a new password</h2>
    <p class="sub">Enter and confirm your new password below.</p>
    <div class="alert alert-error" id="errMsg"></div>
    <div class="alert alert-success" id="sucMsg"></div>
    <form id="form">
      <div class="field">
        <label>New Password</label>
        <input type="password" id="pw" placeholder="Min 8 characters" required/>
        <div class="hint">At least 8 characters</div>
      </div>
      <div class="field">
        <label>Confirm Password</label>
        <input type="password" id="pw2" placeholder="Repeat password" required/>
      </div>
      <button class="btn" id="btn" type="submit">Set New Password</button>
    </form>
    <div class="back"><a id="backLink" href="/provider-login">← Back to login</a></div>
  </div>
  <script>
    const params = new URLSearchParams(location.search);
    const token = params.get('token');
    const type = params.get('type') || 'provider'; // 'provider' or 'member'
    const isProvider = type === 'provider';

    // Style based on account type
    if (!isProvider) {
      document.body.style.background = '#fff8f5';
      document.querySelector('.btn').classList.add('orange');
      document.querySelector('input:focus') // will apply via style
      const style = document.createElement('style');
      style.textContent = 'input:focus{border-color:#f07d3a!important}.back a{color:#f07d3a!important}';
      document.head.appendChild(style);
    }

    document.getElementById('backLink').href = isProvider ? '/provider-login' : '/member-login';

    if (!token) {
      document.getElementById('card').innerHTML = `
        <div class="invalid">
          <p>Invalid or missing reset link.</p>
          <a href="${isProvider ? '/provider-login' : '/member-login'}" style="color:${isProvider ? '#2a7ab5' : '#f07d3a'};font-size:14px;font-weight:600">Request a new one →</a>
        </div>`;
    }

    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn');
      const errMsg = document.getElementById('errMsg');
      const sucMsg = document.getElementById('sucMsg');
      const pw = document.getElementById('pw').value;
      const pw2 = document.getElementById('pw2').value;
      errMsg.className = 'alert alert-error';
      sucMsg.className = 'alert alert-success';

      if (pw.length < 8) {
        errMsg.textContent = 'Password must be at least 8 characters.';
        errMsg.classList.add('show'); return;
      }
      if (pw !== pw2) {
        errMsg.textContent = 'Passwords do not match.';
        errMsg.classList.add('show'); return;
      }

      btn.disabled = true; btn.textContent = 'Saving...';
      const endpoint = isProvider ? '/api/provider/reset-password' : '/api/member/reset-password';
      try {
        const res = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, new_password: pw })
        });
        const data = await res.json();
        if (data.success) {
          sucMsg.textContent = 'Password updated! Redirecting to login...';
          sucMsg.classList.add('show');
          document.getElementById('form').style.display = 'none';
          setTimeout(() => {
            window.location.href = isProvider ? '/provider-login' : '/member-login';
          }, 2000);
        } else {
          errMsg.textContent = data.error || 'Failed to reset password. The link may have expired.';
          errMsg.classList.add('show');
          btn.disabled = false; btn.textContent = 'Set New Password';
        }
      } catch(err) {
        errMsg.textContent = 'Something went wrong. Please try again.';
        errMsg.classList.add('show');
        btn.disabled = false; btn.textContent = 'Set New Password';
      }
    });
  </script>
</body>
</html>
