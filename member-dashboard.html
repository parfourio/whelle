<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Whelle - Member Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#fff8f5;min-height:100vh;font-family:'Inter',sans-serif;color:#1a202c}
header{background:#fff;border-bottom:1px solid #e5e7eb;padding:0 32px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:#2a7ab5;text-decoration:none}
.logo span{color:#f07d3a}
.logout{font-size:13px;color:#6b7280;text-decoration:none;padding:6px 12px;border:1px solid #e5e7eb;border-radius:8px}
.logout:hover{border-color:#dc2626;color:#dc2626}
.page{max-width:960px;margin:0 auto;padding:40px 24px 80px}
.page-title{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;margin-bottom:4px}
.page-sub{font-size:14px;color:#6b7280;margin-bottom:32px}
.tabs{display:flex;gap:4px;background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:4px;margin-bottom:28px;width:fit-content}
.tab{padding:8px 20px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;color:#6b7280;transition:all .2s;border:none;background:transparent;font-family:'Inter',sans-serif}
.tab.active{background:#f07d3a;color:#fff}
.section{display:none}
.section.active{display:block}
.card{background:#fff;border-radius:14px;border:1px solid #e5e7eb;padding:24px;margin-bottom:20px}
.card-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;margin-bottom:16px}
.field{margin-bottom:16px}
label{display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em}
input{width:100%;background:#f9fafb;border:1.5px solid #e5e7eb;color:#1a202c;font-family:'Inter',sans-serif;font-size:14px;padding:10px 14px;border-radius:9px;outline:none;transition:border-color .15s}
input:focus{border-color:#f07d3a;background:#fff}
.photo-upload-area{display:flex;align-items:center;gap:16px;padding:16px;background:#f9fafb;border:1.5px dashed #e5e7eb;border-radius:9px;cursor:pointer;transition:all .15s}
.photo-upload-area:hover{border-color:#f07d3a;background:#fff8f5}
.photo-preview{width:60px;height:60px;border-radius:50%;background:#fed7aa;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#f07d3a;overflow:hidden;flex-shrink:0}
.photo-preview img{width:100%;height:100%;object-fit:cover}
.photo-upload-text{font-size:13px;color:#6b7280}
.photo-upload-text strong{display:block;color:#374151;font-size:14px;margin-bottom:2px}
.photo-upload-text span{font-size:11px;color:#9ca3af}
.btn{padding:11px 20px;border-radius:9px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;border:none}
.btn-primary{background:#f07d3a;color:#fff}
.btn-primary:hover{background:#d96a2a}
.btn-ghost{background:#fff;color:#374151;border:1.5px solid #e5e7eb}
.alert{padding:10px 14px;border-radius:9px;font-size:13px;margin-bottom:14px;display:none}
.alert.show{display:block}
.alert-success{background:#f0fdf4;border:1px solid #bbf7d0;color:#15803d}
.alert-error{background:#fff0f0;border:1px solid #fecaca;color:#dc2626}

/* Provider cards */
.providers-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px}
.provider-card{background:#fff;border-radius:14px;border:1px solid #e5e7eb;padding:20px;transition:box-shadow .2s;cursor:pointer}
.provider-card:hover{box-shadow:0 4px 16px rgba(240,125,58,.15);border-color:#fed7aa}
.prov-avatar{width:64px;height:64px;border-radius:50%;background:#dbeafe;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#2a7ab5;margin-bottom:12px;overflow:hidden}
.prov-avatar img{width:100%;height:100%;object-fit:cover}
.prov-name{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;margin-bottom:2px}
.prov-modality{font-size:12px;font-weight:600;color:#f07d3a;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.prov-location{font-size:13px;color:#6b7280;margin-bottom:10px}
.prov-bio{font-size:13px;color:#4b5563;line-height:1.5;margin-bottom:12px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.service-chip{display:inline-flex;align-items:center;gap:4px;background:#f0f6fc;color:#2a7ab5;font-size:11px;font-weight:600;padding:3px 8px;border-radius:100px;margin:2px}
.filters{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.filter-btn{padding:7px 16px;border-radius:100px;border:1.5px solid #e5e7eb;font-size:13px;font-weight:600;cursor:pointer;background:#fff;color:#374151;font-family:'Inter',sans-serif;transition:all .15s}
.filter-btn.active{border-color:#f07d3a;background:#fff8f5;color:#f07d3a}
.empty{text-align:center;padding:48px;color:#6b7280;font-size:14px}
.profile-header{display:flex;align-items:center;gap:16px;margin-bottom:20px}
.profile-avatar{width:80px;height:80px;border-radius:50%;background:#fed7aa;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:#f07d3a;overflow:hidden}
.profile-avatar img{width:100%;height:100%;object-fit:cover}
</style>
</head>
<body>

<header>
  <a href="/" class="logo">wh<span>elle</span></a>
  <a href="/logout" class="logout">Sign out</a>
</header>

<div class="page">
  <div class="page-title" id="pageTitle">Welcome back</div>
  <p class="page-sub">Find and connect with wellness providers</p>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('browse')">Browse Providers</button>
    <button class="tab" onclick="switchTab('profile')">My Profile</button>
  </div>

  <!-- BROWSE -->
  <div class="section active" id="browseSection">
    <div class="filters" id="filtersEl">
      <button class="filter-btn active" onclick="filterBy(this,'')">All</button>
      <button class="filter-btn" onclick="filterBy(this,'Personal Training')">Personal Training</button>
      <button class="filter-btn" onclick="filterBy(this,'Massage Therapy')">Massage</button>
      <button class="filter-btn" onclick="filterBy(this,'Yoga / Pilates')">Yoga / Pilates</button>
      <button class="filter-btn" onclick="filterBy(this,'Nutrition')">Nutrition</button>
      <button class="filter-btn" onclick="filterBy(this,'Acupuncture')">Acupuncture</button>
      <button class="filter-btn" onclick="filterBy(this,'Intuitive / Energy')">Intuitive</button>
    </div>
    <div class="providers-grid" id="providersGrid">
      <div class="empty">Loading providers...</div>
    </div>
  </div>

  <!-- PROFILE -->
  <div class="section" id="profileSection">
    <div class="card">
      <div class="profile-header">
        <div class="profile-avatar" id="memberAvatar"><span id="memberInitial">?</span></div>
        <div>
          <div style="font-family:'Syne',sans-serif;font-size:18px;font-weight:700" id="memberName">Loading...</div>
          <div style="font-size:13px;color:#6b7280" id="memberEmail"></div>
          <div style="font-size:13px;color:#6b7280" id="memberLocation"></div>
        </div>
      </div>
      <div class="card-title">Edit Profile</div>
      <div class="alert alert-success" id="profileSuccess"></div>
      <div class="alert alert-error" id="profileError"></div>
      <div class="field">
        <label>Full Name</label>
        <input type="text" id="fieldName" placeholder="Your name" autocomplete="off"/>
      </div>
      <div class="field">
        <label>Profile Photo</label>
        <div class="photo-upload-area" onclick="document.getElementById('photoFileInput').click()">
          <div class="photo-preview" id="uploadPreview"><span id="uploadInitial">?</span></div>
          <div class="photo-upload-text">
            <strong>Upload a photo</strong>
            Click to choose from your device
            <span>JPG, PNG or GIF · Max 5MB</span>
          </div>
        </div>
        <input type="file" id="photoFileInput" accept="image/*" style="display:none" onchange="handlePhotoSelect(this)"/>
        <canvas id="resizeCanvas" style="display:none"></canvas>
      </div>
      <div class="field">
        <label>Location (optional)</label>
        <input type="text" id="fieldLocation" placeholder="City, State" autocomplete="off"/>
      </div>
      <button class="btn btn-primary" onclick="saveProfile()">Save Changes</button>
    </div>
  </div>

</div>

<script>
let allProviders = [];
let activeFilter = '';
let memberData = null;
let newPhotoBase64 = null; // holds newly selected photo, null = no change

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', (i===0&&tab==='browse')||(i===1&&tab==='profile'));
  });
  document.getElementById('browseSection').classList.toggle('active', tab==='browse');
  document.getElementById('profileSection').classList.toggle('active', tab==='profile');
}

function handlePhotoSelect(input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 5 * 1024 * 1024) {
    alert('Please choose an image under 5MB.');
    input.value = ''; return;
  }
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.getElementById('resizeCanvas');
      const MAX = 256;
      let w = img.width, h = img.height;
      if (w > h) { if (w > MAX) { h = h * MAX / w; w = MAX; } }
      else { if (h > MAX) { w = w * MAX / h; h = MAX; } }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      newPhotoBase64 = canvas.toDataURL('image/jpeg', 0.82);
      // Show preview in upload area
      document.getElementById('uploadPreview').innerHTML = `<img src="${newPhotoBase64}"/>`;
      // Also update the sidebar avatar
      document.getElementById('memberAvatar').innerHTML = `<img src="${newPhotoBase64}"/>`;
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

async function loadMember() {
  try {
    const res = await fetch('/api/member/me');
    if (res.status === 401) { window.location.href = '/member-login'; return; }
    if (!res.ok) return; // server error — don't redirect, just stay on page
    memberData = await res.json();
    applyMemberData();
  } catch(e) {
    // Network error — don't redirect, user is still logged in
    console.warn('loadMember network error:', e);
  }
}

function applyMemberData() {
  const m = memberData;
  if (!m) return;
  const first = (m.name || '').split(' ')[0] || 'there';
  document.getElementById('pageTitle').textContent = `Welcome back, ${first}`;
  document.getElementById('memberName').textContent = m.name || '';
  document.getElementById('memberEmail').textContent = m.email || '';
  document.getElementById('memberLocation').textContent = m.location || '';
  const initial = (m.name || '?')[0].toUpperCase();
  document.getElementById('memberInitial').textContent = initial;
  document.getElementById('uploadInitial').textContent = initial;
  if (m.photo_url) {
    document.getElementById('memberAvatar').innerHTML = `<img src="${m.photo_url}" onerror="this.style.display='none'"/>`;
    document.getElementById('uploadPreview').innerHTML = `<img src="${m.photo_url}" onerror="this.parentElement.innerHTML='<span>${initial}</span>'"/>`;
  }
  document.getElementById('fieldName').value = m.name || '';
  document.getElementById('fieldLocation').value = m.location || '';
}

async function loadProviders() {
  try {
    const res = await fetch('/api/admin/providers');
    if (!res.ok) { renderProviders([]); return; }
    const data = await res.json();
    allProviders = (data.providers || []).filter(p => p.active && p.approved);
    renderProviders(allProviders);
  } catch(e) {
    renderProviders([]);
  }
}

function filterBy(btn, modality) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeFilter = modality;
  const filtered = modality ? allProviders.filter(p => p.modality === modality) : allProviders;
  renderProviders(filtered);
}

function renderProviders(providers) {
  const grid = document.getElementById('providersGrid');
  if (!providers.length) {
    grid.innerHTML = '<div class="empty">No providers found yet. Check back soon.</div>';
    return;
  }
  grid.innerHTML = providers.map(p => `
    <div class="provider-card" onclick="window.open('/provider/${p.slug}','_blank')">
      <div class="prov-avatar">${p.photo_url ? `<img src="${p.photo_url}" onerror="this.style.display='none'"/>` : (p.name||'?')[0].toUpperCase()}</div>
      <div class="prov-modality">${p.modality || ''}</div>
      <div class="prov-name">${p.name}</div>
      <div class="prov-location">${p.location || ''}</div>
      ${p.bio ? `<div class="prov-bio">${p.bio}</div>` : ''}
      <div>${Array.isArray(p.services) && p.services.length ? p.services.slice(0,3).map(s => `<span class="service-chip">$${s.price} ${s.name}</span>`).join('') : '<span style="font-size:12px;color:#9ca3af">No services listed yet</span>'}</div>
    </div>`).join('');
}

async function saveProfile() {
  const sucEl = document.getElementById('profileSuccess');
  const errEl = document.getElementById('profileError');
  sucEl.classList.remove('show'); errEl.classList.remove('show');
  try {
    const payload = {
      name: document.getElementById('fieldName').value.trim(),
      location: document.getElementById('fieldLocation').value.trim(),
    };
    if (newPhotoBase64) payload.photo_url = newPhotoBase64;
    const res = await fetch('/api/member/me', {
      method:'PUT', headers:{'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    });

    const ok = res.ok || res.status === 200 || res.status === 204;
    let serverError = null;
    if (!ok) {
      try { const d = await res.json(); serverError = d.error; } catch(e) {}
    }

    if (ok) {
      memberData.name = document.getElementById('fieldName').value.trim();
      memberData.location = document.getElementById('fieldLocation').value.trim();
      if (newPhotoBase64) { memberData.photo_url = newPhotoBase64; newPhotoBase64 = null; }
      applyMemberData();
      sucEl.textContent = 'Profile saved.';
      sucEl.classList.add('show');
      setTimeout(() => sucEl.classList.remove('show'), 3000);
    } else {
      errEl.textContent = serverError || 'Failed to save. Please try again.';
      errEl.classList.add('show');
    }
  } catch(e) {
    // Optimistic update — data likely saved even if response was lost
    memberData.name = document.getElementById('fieldName').value.trim();
    memberData.location = document.getElementById('fieldLocation').value.trim();
    if (newPhotoBase64) { memberData.photo_url = newPhotoBase64; newPhotoBase64 = null; }
    applyMemberData();
    sucEl.textContent = 'Profile saved.';
    sucEl.classList.add('show');
    setTimeout(() => sucEl.classList.remove('show'), 3000);
  }
}

loadMember();
loadProviders();
</script>
</body>
</html>
