<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Provider - Whelle</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f0f6fc;min-height:100vh;font-family:'Inter',sans-serif;color:#1a202c}
header{background:#fff;border-bottom:1px solid #e5e7eb;padding:0 32px;height:60px;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:#2a7ab5;text-decoration:none}
.logo span{color:#f07d3a}
.back{font-size:13px;color:#6b7280;text-decoration:none;padding:6px 12px;border:1px solid #e5e7eb;border-radius:8px}
.back:hover{color:#2a7ab5;border-color:#2a7ab5}
.page{max-width:760px;margin:0 auto;padding:48px 24px 80px}
.hero{background:#fff;border-radius:16px;border:1px solid #e5e7eb;padding:32px;display:flex;gap:24px;align-items:flex-start;margin-bottom:24px}
.avatar{width:100px;height:100px;border-radius:50%;background:#dbeafe;display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:700;color:#2a7ab5;flex-shrink:0;overflow:hidden}
.avatar img{width:100%;height:100%;object-fit:cover}
.hero-info{flex:1}
.modality-tag{font-size:11px;font-weight:700;color:#f07d3a;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.provider-name{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;margin-bottom:4px}
.location{font-size:14px;color:#6b7280;margin-bottom:12px}
.bio{font-size:15px;color:#374151;line-height:1.7}
.card{background:#fff;border-radius:14px;border:1px solid #e5e7eb;padding:24px;margin-bottom:20px}
.card-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;margin-bottom:16px}
.service-item{display:flex;align-items:center;justify-content:space-between;padding:16px;background:#f9fafb;border-radius:10px;border:1px solid #e5e7eb;margin-bottom:10px}
.service-name{font-weight:600;font-size:15px;margin-bottom:2px}
.service-meta{font-size:13px;color:#6b7280}
.service-price{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:#2a7ab5}
.btn-book{background:#f07d3a;color:#fff;border:none;padding:10px 20px;border-radius:9px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;margin-left:12px;transition:all .2s}
.btn-book:hover{background:#d96a2a}
.loading{text-align:center;padding:80px;color:#6b7280}
.not-found{text-align:center;padding:80px}
.not-found h2{font-family:'Syne',sans-serif;font-size:24px;font-weight:700;margin-bottom:8px}
</style>
</head>
<body>

<header>
  <a href="/" class="logo">wh<span>elle</span></a>
  <a href="/" class="back">← All Providers</a>
</header>

<div class="page" id="pageContent">
  <div class="loading">Loading provider...</div>
</div>

<script>
async function loadProvider() {
  const slug = window.location.pathname.split('/').pop();
  try {
    const res = await fetch(`/api/provider/profile/${slug}`);
    const data = await res.json();
    if (data.error || !data.name) {
      document.getElementById('pageContent').innerHTML = `
        <div class="not-found">
          <h2>Provider not found</h2>
          <p style="color:#6b7280">This profile may not be available.</p>
        </div>`;
      return;
    }
    document.title = `${data.name} - Whelle`;
    const services = Array.isArray(data.services) ? data.services : [];
    document.getElementById('pageContent').innerHTML = `
      <div class="hero">
        <div class="avatar">${data.photo_url ? `<img src="${data.photo_url}" onerror="this.style.display='none'"/>` : (data.name||'?')[0].toUpperCase()}</div>
        <div class="hero-info">
          <div class="modality-tag">${data.modality || ''}</div>
          <div class="provider-name">${data.name}</div>
          <div class="location">${data.location || ''}</div>
          ${data.bio ? `<div class="bio">${data.bio}</div>` : ''}
        </div>
      </div>
      ${services.length ? `
      <div class="card">
        <div class="card-title">Services</div>
        ${services.map(s => `
          <div class="service-item">
            <div>
              <div class="service-name">${s.name}</div>
              <div class="service-meta">${s.duration ? s.duration + ' min' : ''}${s.description ? ' - ' + s.description : ''}</div>
            </div>
            <div style="display:flex;align-items:center">
              <div class="service-price">$${s.price}</div>
              <button class="btn-book" onclick="bookService('${data.name}', '${s.name}', ${s.price})">Book</button>
            </div>
          </div>`).join('')}
      </div>` : ''}
      <div class="card" style="background:#fff8f5;border-color:#fed7aa">
        <div style="font-size:13px;color:#6b7280;text-align:center">
          Booking and payments coming soon. <a href="/member-login" style="color:#f07d3a;font-weight:600">Create a free account</a> to get notified.
        </div>
      </div>`;
  } catch(e) {
    document.getElementById('pageContent').innerHTML = '<div class="loading">Failed to load provider.</div>';
  }
}

function bookService(provider, service, price) {
  alert(`Booking for "${service}" with ${provider} ($${price}) - Payments coming soon! Create an account to be notified when booking goes live.`);
}

loadProvider();
</script>
</body>
</html>
